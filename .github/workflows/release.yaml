name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: install openwrt-releaser
        run: go install github.com/sonroyaalmerol/go-openwrt-releaser/cmd/openwrt-releaser@main

      - name: extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: build and package all targets
        run: openwrt-releaser --config openwrt-releaser.yaml --root . --skip-release --skip-index

      - name: collect packages
        run: |
          mkdir -p dist/feed
          find . -path ./dist -prune -o -name "*.apk" -print -exec cp {} dist/feed/ \;
          ls -la dist/feed/

      - name: upload release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/feed/*.apk

      - name: prepare signing key
        env:
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          if [ -n "$APK_SIGN_KEY" ]; then
            printf '%s\n' "$APK_SIGN_KEY" > dist/feed/private-key.pem
            openssl ec -in dist/feed/private-key.pem -pubout -out dist/feed/multicast-relay.pem 2>/dev/null
            echo "using secret APK_SIGN_KEY"
          else
            echo "::warning::APK_SIGN_KEY secret not set; feed will be unsigned"
          fi

      - name: generate apk repository index
        run: |
          APK="$(find . -path '*/.owrt-sdk-cache/host/bin/apk' -type f | head -1)"
          ARGS=(--allow-untrusted --output dist/feed/packages.adb dist/feed/*.apk)
          if [ -f dist/feed/private-key.pem ]; then
            ARGS=(--allow-untrusted --sign-key dist/feed/private-key.pem --output dist/feed/packages.adb dist/feed/*.apk)
          fi
          "$APK" mkndx "${ARGS[@]}"
          ls -la dist/feed/

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/feed

      - name: deploy to github pages
        uses: actions/deploy-pages@v4
