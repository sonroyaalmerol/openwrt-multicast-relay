name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: download and setup openwrt sdk
        run: |
          OPENWRT_VERSION="25.12.4"
          TARGET_PATH="ipq806x/generic"
          BOARD="ipq806x"
          SUBTARGET="generic"
          ARCH_SUFFIX="eabi"

          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET_PATH}/openwrt-sdk-${OPENWRT_VERSION}-${BOARD}-${SUBTARGET}_gcc-14.3.0_musl_${ARCH_SUFFIX}.Linux-x86_64.tar.zst"
          curl -fSL -o sdk.tar.zst "${SDK_URL}"

          curl -fSL -o sha256sums "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET_PATH}/sha256sums"
          echo "$(grep "$(basename "${SDK_URL}")" sha256sums | awk '{print $1}')  sdk.tar.zst" | sha256sum -c

          tar --zstd -xf sdk.tar.zst
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          mv "${SDK_DIR}" sdk

      - name: update Makefile version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -n "${VERSION}" ]; then
            sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" openwrt/multicast-relay/Makefile
            sed -i "s/PKG_SOURCE_VERSION:=v.*/PKG_SOURCE_VERSION:=v${VERSION}/" openwrt/multicast-relay/Makefile
            sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" openwrt/luci-app-multicast-relay/Makefile
          fi

      - name: configure feeds
        run: |
          cp sdk/feeds.conf.default sdk/feeds.conf
          echo "src-link multicast_relay ${GITHUB_WORKSPACE}/openwrt" >> sdk/feeds.conf

      - name: update and install feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: patch sdk golang for offline builds
        run: python3 scripts/patch-sdk-gotochain.py "${GITHUB_WORKSPACE}/sdk/feeds/packages/lang/golang"

      - name: enable packages in config
        run: |
          cd sdk
          echo "CONFIG_PACKAGE_multicast-relay=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-multicast-relay=y" >> .config
          make defconfig

      - name: build multicast-relay
        run: |
          cd sdk
          make package/multicast-relay/compile V=s -j$(nproc)

      - name: build luci-app-multicast-relay
        run: |
          cd sdk
          make package/luci-app-multicast-relay/compile V=s -j$(nproc)

      - name: collect packages
        run: |
          mkdir -p dist
          find sdk/bin -name "multicast-relay-*.apk" -exec cp {} dist/ \;
          find sdk/bin -name "luci-app-multicast-relay-*.apk" -exec cp {} dist/ \;
          ls -la dist/

      - name: upload release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk

      - name: prepare signing key
        env:
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          mkdir -p feed
          if [ -n "$APK_SIGN_KEY" ]; then
            printf '%s\n' "$APK_SIGN_KEY" > feed/private-key.pem
            openssl ec -in feed/private-key.pem -pubout -out feed/multicast-relay.pem 2>/dev/null
            echo "using secret APK_SIGN_KEY"
          elif [ -f keys/multicast-relay.pem ]; then
            echo "::warning::APK_SIGN_KEY secret not set; feed will be unsigned/untrusted. Set the secret for a signed feed."
          else
            echo "::warning::No signing key available (secret APK_SIGN_KEY missing and no committed key). Feed will be unsigned."
          fi

      - name: generate apk repository index
        run: |
          cd dist
          APK="../sdk/staging_dir/host/bin/apk"
          ARGS=(--allow-untrusted --output packages.adb *.apk)
          if [ -f ../feed/private-key.pem ]; then
            ARGS=(--allow-untrusted --sign-key ../feed/private-key.pem --output packages.adb *.apk)
          fi
          "$APK" mkndx "${ARGS[@]}"
          cp packages.adb ../feed/
          cp *.apk ../feed/
          [ -f ../feed/multicast-relay.pem ] || cp ../keys/multicast-relay.pem ../feed/ 2>/dev/null || true
          echo "=== feed contents ==="
          ls -la ../feed/

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: feed

      - name: deploy to github pages
        uses: actions/deploy-pages@v4
