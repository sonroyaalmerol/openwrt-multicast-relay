version: 2

builds:
  - id: multicast-relay
    main: ./cmd/multicast-relay
    binary: multicast-relay
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - arm
      - arm64
      - amd64
    goarm:
      - 7

nfpms:
  - id: apk
    package_name: multicast-relay
    vendor: sonroyaalmerol
    homepage: https://github.com/sonroyaalmerol/openwrt-multicast-relay
    maintainer: sonroyaalmerol@gmail.com
    description: Relay mDNS, SSDP, and other multicast/broadcast traffic between network interfaces
    license: MIT
    formats:
      - apk
    contents:
      - src: confs/etc/init.d/multicast-relay
        dst: /etc/init.d/multicast-relay
        file_info:
          mode: 0755
      - src: confs/etc/config/multicast-relay
        dst: /etc/config/multicast-relay
        type: config|noreplace
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh

  - id: luci
    package_name: luci-app-multicast-relay
    vendor: sonroyaalmerol
    homepage: https://github.com/sonroyaalmerol/openwrt-multicast-relay
    maintainer: sonroyaalmerol@gmail.com
    description: LuCI web interface for multicast-relay
    license: MIT
    formats:
      - apk
    meta: true
    contents:
      - src: confs/usr/share/luci/menu.d/luci-app-multicast-relay.json
        dst: /usr/share/luci/menu.d/luci-app-multicast-relay.json
      - src: confs/usr/share/rpcd/acl.d/luci-app-multicast-relay.json
        dst: /usr/share/rpcd/acl.d/luci-app-multicast-relay.json
      - src: confs/www/luci-static/resources/view/multicast-relay/config.js
        dst: /www/luci-static/resources/view/multicast-relay/config.js
    dependencies:
      - multicast-relay

checksum:
  name_template: "{{ .ProjectName }}_{{ .Tag }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"