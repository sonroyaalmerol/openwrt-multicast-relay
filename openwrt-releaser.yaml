  - openwrt: bcm53xx/generic
  - openwrt: tegra/generic
  - openwrt: zynq/generic
  - openwrt: omap/generic
  - openwrt: pistachio/generic
  - openwrt: loongarch64/generic
  - openwrt: kirkwood/generic
  - openwrt: mxs/generic
  - openwrt: at91/sam9x
  - openwrt: at91/sama5
  - openwrt: at91/sama7

packages:
  - name: multicast-relay
    description: "Relay mDNS, SSDP, and other multicast/broadcast traffic between network interfaces."
    license: MIT
    maintainer: sonroyaalmerol
    url: https://github.com/sonroyaalmerol/openwrt-multicast-relay
    depends:
      - libc
    binary: true
    binary_dest: /usr/bin
    files:
      - src: openwrt/multicast-relay/files/etc/init.d/multicast-relay
        dest: /etc/init.d/multicast-relay
        mode: "0755"
      - src: openwrt/multicast-relay/files/etc/config/multicast-relay
        dest: /etc/config/multicast-relay
        mode: "0600"
        conf: true
    conffiles:
      - /etc/config/multicast-relay

  - name: luci-app-multicast-relay
    description: "LuCI web interface for configuring multicast-relay."
    license: MIT
    maintainer: sonroyaalmerol
    url: https://github.com/sonroyaalmerol/openwrt-multicast-relay
    depends:
      - multicast-relay
    arch_all: true
    files:
      - src: openwrt/luci-app-multicast-relay/root/usr/share/luci/menu.d/luci-app-multicast-relay.json
        dest: /usr/share/luci/menu.d/luci-app-multicast-relay.json
        mode: "0644"
      - src: openwrt/luci-app-multicast-relay/root/usr/share/rpcd/acl.d/luci-app-multicast-relay.json
        dest: /usr/share/rpcd/acl.d/luci-app-multicast-relay.json
        mode: "0644"
      - src: openwrt/luci-app-multicast-relay/htdocs/luci-static/resources/view/multicast-relay/config.js
        dest: /www/luci-static/resources/view/multicast-relay/config.js
        mode: "0644"

release:
  sign_key_env: APK_SIGN_KEY
  github:
    owner: sonroyaalmerol
    name: openwrt-multicast-relay
  pages: true
